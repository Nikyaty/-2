<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニにゃんこバトル</title>
<style>
body{
    text-align:center;
    font-family:sans-serif;
    background:#e0f7ff;
}

#game{
    position:relative;
    width:800px;
    height:300px;
    margin:auto;
    border:3px solid black;
    background:#aee1ff;
    overflow:hidden;
}

.cat{
    position:absolute;
    bottom:0;
    left:50px;
    font-size:40px;
}

.enemy{
    position:absolute;
    bottom:0;
    right:0;
    font-size:40px;
}

button{
    margin-top:10px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>ミニにゃんこバトル 🐱</h1>

<div id="game">
<div id="cat" class="cat">🐱</div>
<div id="enemy" class="enemy">👾</div>
</div>

<button onclick="attack()">ネコ攻撃！</button>

<p id="hp">敵HP: 10</p>

<script>

let enemyHP = 10;
let enemy = document.getElementById("enemy");

function attack(){

    enemyHP--;

    document.getElementById("hp").innerText = "敵HP: " + enemyHP;

    enemy.style.right = (parseInt(enemy.style.right || 0) + 30) + "px";

    if(enemyHP <= 0){
        alert("勝ち！🎉");
        enemyHP = 10;
        enemy.style.right = "0px";
        document.getElementById("hp").innerText = "敵HP: 10";
    }

}

</script>

</body>
</html>
