<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カーゲーム</title>

<style>
body{
    text-align:center;
    background:#87ceeb;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:400px;
    height:600px;
    margin:auto;
    background:#555;
    overflow:hidden;
    border:5px solid black;
}

#car{
    position:absolute;
    bottom:20px;
    left:180px;
    font-size:40px;
}

.enemy{
    position:absolute;
    font-size:40px;
}

#score{
    font-size:24px;
}
</style>
</head>

<body>

<h1>カーゲーム 🚗</h1>
<p>← → キーで車を動かす</p>
<p id="score">スコア: 0</p>

<div id="game">
<div id="car">🚗</div>
</div>

<script>

let car = document.getElementById("car");
let game = document.getElementById("game");
let carX = 180;
let enemies = [];
let score = 0;

document.addEventListener("keydown", e => {

    if(e.key === "ArrowLeft"){
        carX -= 20;
    }

    if(e.key === "ArrowRight"){
        carX += 20;
    }

    if(carX < 0) carX = 0;
    if(carX > 360) carX = 360;

    car.style.left = carX + "px";
});

function spawnEnemy(){

    let enemy = document.createElement("div");
    enemy.className = "enemy";
    enemy.innerText = "🚙";

    enemy.x = Math.random() * 360;
    enemy.y = -40;

    enemy.style.left = enemy.x + "px";
    enemy.style.top = enemy.y + "px";

    game.appendChild(enemy);
    enemies.push(enemy);

}

setInterval(spawnEnemy,1000);

function gameLoop(){

    enemies.forEach(enemy => {

        enemy.y += 4;
        enemy.style.top = enemy.y + "px";

        if(Math.abs(enemy.x - carX) < 40 && enemy.y > 520){
            alert("ゲームオーバー 😢 スコア: " + score);
            location.reload();
        }

        if(enemy.y > 600){
            enemy.remove();
            score++;
            document.getElementById("score").innerText = "スコア: " + score;
        }

    });

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
