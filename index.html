<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カーゲーム</title>

<style>
body{
    text-align:center;
    background:#87ceeb;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:400px;
    height:600px;
    margin:auto;
    background:#444;
    overflow:hidden;
    border:5px solid black;
}

#car{
    position:absolute;
    bottom:20px;
    left:180px;
    font-size:40px;
}

.enemy{
    position:absolute;
    font-size:40px;
}

#score{
    font-size:24px;
}
</style>
</head>

<body>

<h1>カーゲーム 🚗</h1>
<p>← → キーで車を動かす</p>
<p id="score">スコア: 0</p>

<div id="game">
<div id="car">🚗</div>
</div>

<script>

let game = document.getElementById("game");
let car = document.getElementById("car");

let carX = 180;
let enemies = [];
let score = 0;

let spawnTime = 1000;

document.addEventListener("keydown", function(e){

    if(e.key === "ArrowLeft") carX -= 40;
    if(e.key === "ArrowRight") carX += 40;

    if(carX < 0) carX = 0;
    if(carX > 360) carX = 360;

    car.style.left = carX + "px";
});

function spawnEnemy(){

    let enemy = document.createElement("div");
    enemy.className = "enemy";
    enemy.innerText = "🚙";

    enemy.x = Math.random()*360;
    enemy.y = -60;

    enemy.style.left = enemy.x+"px";
    enemy.style.top = enemy.y+"px";

    game.appendChild(enemy);
    enemies.push(enemy);
}

function enemySpawner(){

    spawnEnemy();

    if(score > 30){
        for(let i=0;i<5;i++){
            spawnEnemy();
        }
        spawnTime = 100;
    }else{
        spawnTime = 800;
    }

    setTimeout(enemySpawner, spawnTime);
}

enemySpawner();

function isCollision(a,b){

    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();

    // 敵の当たり判定を小さくする
    let padding = 12;

    bRect = {
        top: bRect.top + padding,
        bottom: bRect.bottom - padding,
        left: bRect.left + padding,
        right: bRect.right - padding
    };

    return !(
        aRect.top > bRect.bottom ||
        aRect.bottom < bRect.top ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right
    );
}

function gameLoop(){

    enemies.forEach((enemy,i)=>{

        enemy.y += 4;
        enemy.style.top = enemy.y+"px";

        if(isCollision(car,enemy)){
            alert("ゲームオーバー！ スコア: "+score);
            location.reload();
        }

        if(enemy.y>600){
            enemy.remove();
            enemies.splice(i,1);
            score++;
            document.getElementById("score").innerText="スコア: "+score;
        }

    });

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
